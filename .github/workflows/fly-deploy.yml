name: Deployment

# Deploy the rylees web app after the Tests workflow passes on main (i.e. when a
# PR is merged). Chained off Tests via `workflow_run` so a red suite blocks the
# deploy — see tests.yml. Only the web app is deployed here; the rylees-db
# Postgres app (fly.postgres.toml) rarely changes and is deployed manually.
on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

# Never run two deploys at once; if a new merge lands mid-deploy, cancel the
# in-flight one so the latest commit wins.
concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy rylees
    runs-on: ubuntu-latest
    # FLY_API_TOKEN is stored as a secret on the `production` environment, so the
    # job must opt into that environment for `secrets.FLY_API_TOKEN` to resolve.
    environment: production
    # Only deploy when the Tests run actually succeeded (workflow_run also fires
    # on failure/cancelled). PR-triggered Tests runs are filtered out by the
    # `branches: [main]` event filter above.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      # workflow_run checks out the default branch HEAD by default; pin the exact
      # commit that was tested so the right version ships.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # --remote-only builds on Fly's builder (no Docker needed on the runner).
      # --config/--app pin the web app so the Postgres app is never touched.
      # fly.toml's release_command runs `php artisan migrate --force` against
      # rylees-db before the new version goes live.
      - run: flyctl deploy --remote-only --config fly.toml --app rylees
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
