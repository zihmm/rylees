# Fly.io deployment for the Rylees web image (Laravel API + the two built SPAs).
#
# The build context is the repo root (so the image can reach src/api and
# src/frontend); the Dockerfile and its production target live under docker/.
# Without this [build] block fly looks for ./Dockerfile and fails to find one.
#
# Deploy from the repo root:  fly deploy
# (add --remote-only to build on Fly's builder instead of local Docker)

app = "rylees"
primary_region = "cdg"

[build]
  dockerfile = "docker/api/Dockerfile"
  build-target = "prod"

# Runs once per release, before the new version goes live — migrate against the
# Postgres database (the image entrypoint deliberately does not auto-migrate).
# The `rylees-db` Postgres app must already be deployed and running (the release
# machine reaches it over 6PN).
[deploy]
  release_command = "php artisan migrate --force"

# Non-secret config. The database is a separate self-hosted Postgres container
# app (`fly.postgres.toml`) on the private 6PN network (no public IP), reached at
# `rylees-db.internal` — see docker/README "Database (self-hosted Postgres
# container)". Only the secrets (APP_KEY, DB_PASSWORD, MAIL_*, OPENAI_API_KEY)
# are set with `fly secrets set` — never commit them here. DB_USERNAME/DATABASE
# must match the Postgres app's POSTGRES_USER/DB.
[env]
  APP_ENV = "production"
  APP_DOMAIN = "rylees.ai"
  APP_URL = "https://api.rylees.ai"
  DB_CONNECTION = "pgsql"
  DB_HOST = "rylees-db.internal"
  DB_PORT = "5432"
  DB_DATABASE = "rylees"
  DB_USERNAME = "rylees"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
